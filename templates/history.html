<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction History</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-gray-200 min-h-screen">

    
    <div class="absolute top-0 left-0 w-72 h-72 bg-blue-500/20 blur-3xl rounded-full"></div>

    <div class="absolute bottom-0 right-0 w-72 h-72 bg-purple-500/20 blur-3xl rounded-full"></div>

    <div class="relative max-w-7xl mx-auto py-10 px-4">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">

            <a href="/"
                class="inline-flex items-center gap-2 px-5 py-3 rounded-xl border border-blue-500/40 bg-blue-500/10 text-blue-300 hover:bg-blue-500 hover:text-white transition-all duration-300 shadow-lg hover:shadow-blue-500/30 w-fit">

                <span class="text-lg">←</span>

                <span class="font-semibold">
                    Back to Dashboard
                </span>

            </a>

            <div class="text-center md:text-right">

                <h1 class="text-4xl font-extrabold text-white tracking-wide">

                    📜 Prediction History

                </h1>

                <p class="text-gray-400 mt-2">

                    Previous intrusion detection analysis records

                </p>

            </div>

        </div>

        <div
            class="mb-8 bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">

                <div
                    class="bg-gradient-to-br from-blue-500/20 to-blue-600/10 border border-blue-500/20 rounded-2xl p-5">

                    <h2 class="text-4xl font-bold text-blue-400">

                        {{ history_table.count('<tr') - 1 }}

                    </h2>

                    <p class="text-gray-300 mt-2">

                        Total Predictions

                    </p>

                </div>

                <div
                    class="bg-gradient-to-br from-green-500/20 to-green-600/10 border border-green-500/20 rounded-2xl p-5">

                    <h2 class="text-4xl font-bold text-green-400">

                        ML

                    </h2>

                  
                </div>

                <div
                    class="bg-gradient-to-br from-purple-500/20 to-pink-500/10 border border-purple-500/20 rounded-2xl p-5">

                    <h2 class="text-4xl font-bold text-purple-400">

                        IDS

                    </h2>

                    <p class="text-gray-300 mt-2">

                        Intrusion Monitoring

                    </p>

                </div>

            </div>

        </div>

        <div
            class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden">

            <div
                class="bg-gradient-to-r from-blue-600 to-indigo-700 px-6 py-5 border-b border-white/10">

                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                    <div>

                        <h2 class="text-2xl font-bold text-white">

                            📊 Detection Logs

                        </h2>

                        <p class="text-blue-100 mt-1">

                            Historical prediction records stored in CSV

                        </p>

                    </div>

                    

                </div>

            </div>

            <div class="overflow-x-auto">

                <div class="p-5">

                    <div
                        class="rounded-2xl overflow-hidden border border-white/10 shadow-inner bg-slate-900/40">

                        <div class="overflow-x-auto">

                            <style>
                        
                                table {
                                    width: 100%;
                                    border-collapse: separate;
                                    border-spacing: 0 12px;
                                }
                        
                                thead tr {
                                    background: rgba(59, 130, 246, 0.15);
                                }
                        
                                th {
                                    padding: 16px;
                                    text-align: left;
                                    color: white;
                                    font-weight: 700;
                                    font-size: 14px;
                                    border-bottom: 1px solid rgba(255,255,255,0.1);
                                }
                        
                                td {
                                    padding: 16px;
                                    background: rgba(255,255,255,0.03);
                                    color: #e5e7eb;
                                    font-size: 14px;
                                    border-top: 1px solid rgba(255,255,255,0.05);
                                    border-bottom: 1px solid rgba(255,255,255,0.05);
                                }
                        
                                tbody tr:hover td {
                                    background: rgba(59,130,246,0.08);
                                    transition: 0.2s;
                                }
                        
                                tbody tr td:first-child {
                                    border-top-left-radius: 12px;
                                    border-bottom-left-radius: 12px;
                                }
                        
                                tbody tr td:last-child {
                                    border-top-right-radius: 12px;
                                    border-bottom-right-radius: 12px;
                                }
                        
                            </style>
                        
                            {{ history_table|safe }}
                        
                        </div>

                    </div>

                </div>

            </div>

        </div>

       

    </div>

</body>

</html>
